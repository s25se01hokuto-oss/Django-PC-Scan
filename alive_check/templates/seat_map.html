<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>実習室PC死活監視システム</title>
    <style>
        /* サイバーパンク・ターミナル風デザイン */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 画像のレイアウトを再現するグリッド（縦6行 × 横7列） */
        .seating-chart {
            display: grid;
            grid-template-columns: repeat(7, 80px);
            grid-template-rows: repeat(6, 80px);
            gap: 15px;
            padding: 20px;
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }

        /* 各座席の基本スタイル */
        .seat {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 6px;
            font-size: 11px;
            /* IPアドレスが見やすくなるように少し小さめに調整 */
            font-weight: bold;
            transition: all 0.3s ease;
            box-sizing: border-box;
            text-align: center;
            word-break: break-all;
            padding: 4px;
        }

        /* 状態ごとのネオンエフェクト */
        .seat.alive {
            background-color: rgba(0, 255, 100, 0.15);
            border: 2px solid #00ff64;
            color: #00ff64;
            text-shadow: 0 0 8px #00ff64;
            box-shadow: 0 0 12px rgba(0, 255, 100, 0.4), inset 0 0 6px rgba(0, 255, 100, 0.2);
        }

        .seat.dead {
            background-color: rgba(255, 0, 85, 0.15);
            border: 2px solid #ff0055;
            color: #ff0055;
            text-shadow: 0 0 8px #ff0055;
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.4), inset 0 0 6px rgba(255, 0, 85, 0.2);
        }

        /* 各座席の位置固定（グリッド指定） */
        .pos-1-2 {
            grid-area: 1 / 2;
        }

        .pos-2-2 {
            grid-area: 2 / 2;
        }

        .pos-3-2 {
            grid-area: 3 / 2;
        }

        .pos-3-3 {
            grid-area: 3 / 3;
        }

        .pos-3-4 {
            grid-area: 3 / 4;
        }

        .pos-3-5 {
            grid-area: 3 / 5;
        }

        .pos-3-6 {
            grid-area: 3 / 6;
        }

        .pos-3-7 {
            grid-area: 3 / 7;
        }

        /* 手前の直線島（PC15〜PC20をここに配置！） */
        .pos-5-1 {
            grid-area: 5 / 1;
        }

        .pos-5-2 {
            grid-area: 5 / 2;
        }

        .pos-5-3 {
            grid-area: 5 / 3;
        }

        .pos-5-4 {
            grid-area: 5 / 4;
        }

        .pos-5-5 {
            grid-area: 5 / 5;
        }

        .pos-5-6 {
            grid-area: 5 / 6;
        }
    </style>
</head>

<body>

    <div class="seating-chart">
        <div class="seat pos-1-2 {% if pc_states.pc1 %}alive{% else %}dead{% endif %}">PC1<br>192.168...</div>
        <div class="seat pos-2-2 {% if pc_states.pc2 %}alive{% else %}dead{% endif %}">PC2<br>192.168...</div>
        <div class="seat pos-3-2 {% if pc_states.pc3 %}alive{% else %}dead{% endif %}">PC3<br>192.168...</div>
        <div class="seat pos-3-3 {% if pc_states.pc4 %}alive{% else %}dead{% endif %}">PC4<br>192.168...</div>
        <div class="seat pos-3-4 {% if pc_states.pc5 %}alive{% else %}dead{% endif %}">PC5<br>192.168...</div>
        <div class="seat pos-3-5 {% if pc_states.pc6 %}alive{% else %}dead{% endif %}">PC6<br>192.168...</div>
        <div class="seat pos-3-6 {% if pc_states.pc7 %}alive{% else %}dead{% endif %}">PC7<br>192.168...</div>
        <div class="seat pos-3-7 {% if pc_states.pc8 %}alive{% else %}dead{% endif %}">PC8<br>192.168...</div>

        <div class="seat pos-5-1 {% if pc_states.pc15 %}alive{% else %}dead{% endif %}">PC15<br>192.168.203.151</div>
        <div class="seat pos-5-2 {% if pc_states.pc16 %}alive{% else %}dead{% endif %}">PC16<br>192.168.203.152</div>
        <div class="seat pos-5-3 {% if pc_states.pc17 %}alive{% else %}dead{% endif %}">PC17<br>192.168.203.153</div>
        <div class="seat pos-5-4 {% if pc_states.pc18 %}alive{% else %}dead{% endif %}">PC18<br>192.168.203.154</div>
        <div class="seat pos-5-5 {% if pc_states.pc19 %}alive{% else %}dead{% endif %}">PC19<br>192.168.203.155</div>
        <div class="seat pos-5-6 {% if pc_states.pc20 %}alive{% else %}dead{% endif %}">PC20<br>192.168.203.199</div>
    </div>

    <script>
        // 5秒ごとにページを自動リロード
        setInterval(() => { location.reload(); }, 5000);
    </script>
</body>

</html>
